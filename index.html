<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="DietList" />
  <meta name="description" content="Generate a shopping list based on your diet plan" />
  <title>Diet Shopping List</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SCREEN 1: Day Selection -->
  <div id="screen-days" class="screen active">
    <header class="app-header">
      <div class="header-top">
        <h1 class="app-title">Diet Shopping List</h1>
        <button id="btn-select-all" class="btn-text-action">Select All</button>
      </div>
      <p class="app-subtitle">Select the days you want to include in your plan.</p>
    </header>

    <main class="screen-content">
      <div id="days-grid" class="days-grid"></div>
    </main>

    <div class="sticky-bottom">
      <button id="btn-generate" class="btn-primary btn-full" disabled>
        <span class="btn-icon">🛒</span>
        Generate Shopping List
      </button>
    </div>
  </div>

  <!-- SCREEN 2: Shopping List Edit -->
  <div id="screen-list" class="screen">
    <header class="app-header app-header--secondary">
      <div class="header-top">
        <button class="btn-icon-only" id="btn-back-to-days" aria-label="Back">&#8592;</button>
        <div class="header-center">
          <h2 class="screen-title">Shopping List</h2>
          <span class="screen-subtitle">EDIT MODE</span>
        </div>
        <button class="btn-text-action btn-text-action--danger" id="btn-reset">Reset</button>
      </div>
    </header>

    <div class="stats-bar" id="stats-bar"></div>

    <main class="screen-content screen-content--list" id="list-content">
      <!-- Ingredient groups rendered here -->
    </main>

    <div class="sticky-bottom">
      <button id="btn-finalize" class="btn-primary btn-full">
        <span class="btn-icon">🛍️</span>
        Finalize List
      </button>
    </div>
  </div>

  <!-- SCREEN 3: Final Summary -->
  <div id="screen-summary" class="screen">
    <header class="app-header app-header--secondary">
      <div class="header-top">
        <button class="btn-icon-only" id="btn-back-to-list" aria-label="Back">&#8592;</button>
        <div class="header-center">
          <h2 class="screen-title">Final List</h2>
          <span class="screen-subtitle">READY TO SHOP</span>
        </div>
        <div style="width:40px"></div>
      </div>
    </header>

    <main class="screen-content screen-content--list" id="summary-content">
      <!-- Final summary rendered here -->
    </main>

    <div class="sticky-bottom sticky-bottom--row">
      <button id="btn-copy" class="btn-primary btn-flex">
        <span class="btn-icon">📋</span>
        Copy Full List
      </button>
      <button id="btn-start-over" class="btn-secondary btn-flex">
        <span class="btn-icon">🔄</span>
        Start Over
      </button>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- Replace Item Modal -->
  <div id="replace-modal" class="modal-overlay" hidden>
    <div class="modal-box">
      <h3 class="modal-title">Replace Item</h3>
      <p class="modal-desc" id="replace-desc">Enter the replacement item name:</p>
      <input type="text" id="replace-input" class="modal-input" placeholder="Replacement name…" />
      <div class="modal-actions">
        <button id="replace-cancel" class="btn-secondary">Cancel</button>
        <button id="replace-confirm" class="btn-primary">Replace</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
